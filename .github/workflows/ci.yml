# .github/workflows/ci.yml
name: CI/CD Template Project

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

env:
  # Força as Actions que usam Node.js a rodarem na versão 24 (aviso de depreciação)
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-test:
    runs-on: ubuntu-latest

    steps:
    # 1️⃣ Pega o código do repositório
    - name: Checkout code
      uses: actions/checkout@v3

    # 2️⃣ Configura Python
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: 3.12

    # 3️⃣ Instala uv (gerenciador de dependências)
    - name: Install uv
      run: pip install uv

    # 4️⃣ Instala dependências do projeto via uv
    - name: Install project dependencies
      run: uv install

    # 5️⃣ Rodar lint/format opcional (pre-commit é manual aqui para evitar erros de Git)
    - name: Run linters (pre-commit)
      run: uv run pre-commit run --all-files --hook-stage manual || echo "Skipping pre-commit hooks requiring Git"

    # 6️⃣ Rodar testes automatizados
    - name: Run tests
      run: uv run pytest -v

  docker-build:
    runs-on: ubuntu-latest
    needs: build-test  # só roda se os testes passarem

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: 3.12

    - name: Build Docker image
      run: |
        docker build -f docker/Dockerfile -t template-project .

    - name: Test Docker run
      run: |
        docker run --rm template-project uv run python -m src.main