# .github/workflows/ci.yml
name: CI/CD Template Project

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-test:
    runs-on: ubuntu-latest

    steps:
    # 1️⃣ Atualizado para v4
    - name: Checkout code
      uses: actions/checkout@v4

    # 2️⃣ Mantido v5 (é a mais atual)
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.12"

    # 3️⃣ Forma recomendada de instalar o uv no CI (mais rápido que via pip)
    - name: Install uv
      uses: astral-sh/setup-uv@v5

    # 4️⃣ CORREÇÃO: O comando correto é 'uv sync'
    - name: Install project dependencies
      run: uv sync --all-extras --dev

    # 5️⃣ Rodar linters
    - name: Run linters
      run: uv run pre-commit run --all-files || echo "Linter warnings detected"

    # 6️⃣ Rodar testes
    - name: Run tests
      run: uv run pytest -v

  docker-build:
    runs-on: ubuntu-latest
    needs: build-test

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Build Docker image
      run: |
        docker build -f docker/Dockerfile -t template-project .

    - name: Test Docker run
      run: |
        docker run --rm template-project uv run python -m src.main