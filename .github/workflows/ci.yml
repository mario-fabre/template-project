name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: 3.12

    - name: Install uv
      run: pip install uv

    - name: Install dependencies
      run: uv install

    - name: Run pre-commit
      run: uv run pre-commit run --all-files

    - name: Run tests
      run: uv run pytest